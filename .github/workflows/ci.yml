name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Chrome Extension 没有独立 linter，用 node 语法检查
      - name: Check JS syntax
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*" | while read f; do
            node --check "$f" 2>&1 || true
          done

      - name: Validate manifest.json
        run: |
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const required = ['manifest_version', 'name', 'version', 'description', 'permissions', 'background', 'icons'];
          const missing = required.filter(f => !manifest[f]);
          if (missing.length > 0) {
            console.error('manifest.json 缺少字段:', missing.join(', '));
            process.exit(1);
          }
          if (manifest.manifest_version !== 3) {
            console.error('manifest_version 必须为 3');
            process.exit(1);
          }
          console.log('✅ manifest.json 验证通过');
          "

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run unit tests
        run: node --test tests/test-*.js 2>&1

  package-check:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Check package size
        run: |
          # 统计核心文件大小
          TOTAL_SIZE=$(du -sb background content sidebar popup options lib skills icons _locales manifest.json 2>/dev/null | tail -1 | cut -f1)
          echo "核心文件大小: ${TOTAL_SIZE} bytes"
          
          # Chrome Web Store 限制 10MB
          MAX_SIZE=10485760
          if [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
            echo "⚠️ 核心文件超过 10MB 限制"
            exit 1
          fi
          echo "✅ 包体积检查通过"
